name: OSSF Scorecard

# Automated security-posture scoring (OpenSSF Scorecard). Runs on a weekly
# schedule and on pushes to main, publishing results to the GitHub Security tab
# (SARIF) and to the public OpenSSF results store. Read-only; advisory only —
# this does not gate PRs.

on:
  branch_protection_rule:
  schedule:
    - cron: '24 5 * * 1'   # Mondays 05:24 UTC
  push:
    branches: [ main ]

# Top-level least privilege; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the OpenSSF store
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish so the repo earns an OpenSSF Scorecard badge and the score
          # is visible at https://securityscorecards.dev.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
