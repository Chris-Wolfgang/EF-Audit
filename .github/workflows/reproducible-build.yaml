name: Build reproducibility

# Verifies that the deterministic-build knobs in Directory.Build.props
# (<Deterministic>, <ContinuousIntegrationBuild>, SourceLink + EmbedUntrackedSources)
# actually produce byte-identical managed assemblies when the same commit is
# built on different runners. Advisory — cross-OS differences are reported as a
# warning, not a hard failure (managed IL is expected to match; native/embedded
# differences, if any, surface here for investigation).

on:
  workflow_dispatch:
  schedule:
    - cron: '40 5 * * 1'   # Mondays 05:40 UTC

permissions:
  contents: read

jobs:
  build:
    name: Build + hash (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build src (net8.0, Release, deterministic)
        shell: bash
        run: |
          for proj in \
            src/Wolfgang.AuditTrail.Abstractions/Wolfgang.AuditTrail.Abstractions.csproj \
            src/Wolfgang.AuditTrail.EntityFrameworkCore/Wolfgang.AuditTrail.EntityFrameworkCore.csproj \
            src/Wolfgang.AuditTrail.TestKit.Xunit/Wolfgang.AuditTrail.TestKit.Xunit.csproj
          do
            dotnet build "$proj" -c Release -f net8.0 -p:ContinuousIntegrationBuild=true
          done

      - name: Hash assemblies
        shell: bash
        run: |
          sha256sum \
            src/Wolfgang.AuditTrail.Abstractions/bin/Release/net8.0/Wolfgang.AuditTrail.Abstractions.dll \
            src/Wolfgang.AuditTrail.EntityFrameworkCore/bin/Release/net8.0/Wolfgang.AuditTrail.EntityFrameworkCore.dll \
            src/Wolfgang.AuditTrail.TestKit.Xunit/bin/Release/net8.0/Wolfgang.AuditTrail.TestKit.Xunit.dll \
            | awk '{ n = split($2, parts, "/"); print $1 "  " parts[n] }' \
            | sort > "hashes-${{ matrix.os }}.txt"
          echo "== ${{ matrix.os }} =="
          cat "hashes-${{ matrix.os }}.txt"

      - name: Upload hashes
        uses: actions/upload-artifact@v4
        with:
          name: hashes-${{ matrix.os }}
          path: hashes-${{ matrix.os }}.txt

  compare:
    name: Compare across runners
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download hashes
        uses: actions/download-artifact@v4
        with:
          path: hashes

      - name: Diff manifests
        shell: bash
        run: |
          ubuntu="hashes/hashes-ubuntu-latest/hashes-ubuntu-latest.txt"
          windows="hashes/hashes-windows-latest/hashes-windows-latest.txt"
          echo "== ubuntu-latest =="; cat "$ubuntu"
          echo "== windows-latest =="; cat "$windows"
          if diff -u "$ubuntu" "$windows"; then
            echo "✅ Reproducible: managed assembly hashes match across ubuntu + windows."
          else
            echo "::warning::Assembly hashes differ across runners — the build is not byte-identical cross-OS. Investigate embedded paths / SourceLink normalization."
          fi
