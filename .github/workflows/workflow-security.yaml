name: Workflow security audit

# Lints the GitHub Actions workflows themselves for correctness (actionlint) and
# for workflow-level security issues — untrusted-input injection into run blocks,
# over-broad permissions, expression-context secret leaks (zizmor). Advisory:
# surfaces findings as annotations / in the Security tab; does not gate PRs.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: '30 4 * * 1'   # Mondays 04:30 UTC

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: github-check
          level: warning
          fail_level: none   # advisory — report findings without failing the job

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install zizmor
        run: pipx install zizmor

      - name: Run zizmor
        # Non-gating: zizmor exits non-zero when it finds issues; we still want
        # the SARIF uploaded so findings show in the Security tab.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --format sarif . > zizmor.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
