# Integration tests against real database engines via Testcontainers.
#
# Runs on Linux only — GitHub-hosted ubuntu runners come with Docker pre-installed,
# which Testcontainers uses to spin up SQL Server, PostgreSQL, and MySQL containers
# per test class. Windows / macOS runners don't have Docker out of the box, so this
# workflow doesn't try to run there. The unit suite in pr.yaml covers the
# cross-platform invariants.
#
# The integration test csproj sets <IsTestProject> only when RunIntegrationTests=true.
# Without that env var, `dotnet test` discovers no test framework and the project is
# a no-op when pr.yaml iterates over ./tests/*. (pr.yaml's discovery enumerates every
# *.csproj under ./tests and invokes `dotnet test` on each; the project IS visited,
# it just runs zero tests.) This workflow sets RunIntegrationTests=true so the same
# project becomes a normal test project here.

name: Integration Tests

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RunIntegrationTests: 'true'

jobs:
  integration:
    name: Integration Tests (Linux + Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # Integration tests target net8.0 only (Pomelo.EntityFrameworkCore.MySql
          # lags EF Core by one major; bump TFM + this SDK list together when
          # it ships a stable 10.x).
          dotnet-version: 8.0.x

      - name: Verify Docker is available
        run: |
          docker version
          docker info

      - name: Restore
        run: dotnet restore tests/Wolfgang.Audit.EFCore.Tests.Integration/Wolfgang.Audit.EFCore.Tests.Integration.csproj

      - name: Build
        run: |
          dotnet build tests/Wolfgang.Audit.EFCore.Tests.Integration/Wolfgang.Audit.EFCore.Tests.Integration.csproj \
            --no-restore \
            --configuration Release

      - name: Run integration tests
        run: |
          dotnet test tests/Wolfgang.Audit.EFCore.Tests.Integration/Wolfgang.Audit.EFCore.Tests.Integration.csproj \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: TestResults
          if-no-files-found: warn
